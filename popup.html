<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px 16px;
      width: 240px;
      color: #222;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 600;
    }
    .btn-row { display: flex; gap: 6px; margin-bottom: 6px; }
    button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.45; cursor: default; }
    #split { background: #1a73e8; color: #fff; }
    #split:hover:not(:disabled) { background: #1557b0; }
    #revert { background: #e8eaed; color: #444; }
    #revert:hover:not(:disabled) { background: #d2d4d8; }
    #split-all {
      flex: none;
      width: 100%;
      padding: 6px;
      background: none;
      border: 1px solid #ccc;
      border-radius: 4px;
      color: #555;
      font-size: 12px;
      cursor: pointer;
    }
    #split-all:hover:not(:disabled) { background: #f0f0f0; }
    #split-all:disabled { opacity: 0.45; cursor: default; }
    .shortcut { display: block; font-size: 10px; opacity: 0.7; margin-top: 2px; }
    #status {
      margin-top: 8px;
      color: #555;
      min-height: 18px;
      font-size: 12px;
    }
    #status.error { color: #c00; }
    #footer {
      margin-top: 10px;
      border-top: 1px solid #e0e0e0;
      padding-top: 8px;
      font-size: 11px;
      color: #888;
    }
    #footer a { color: #1a73e8; text-decoration: none; cursor: pointer; }
  </style>
</head>
<body>
  <h1>TabSplit</h1>
  <div class="btn-row">
    <button id="split">
      Split
      <span class="shortcut">Alt+Shift+R</span>
    </button>
    <button id="revert" disabled>
      Revert
      <span class="shortcut">Alt+Shift+Z</span>
    </button>
  </div>
  <button id="split-all">
    Split all windows &nbsp;<span style="opacity:.6;font-size:10px">Alt+Shift+W</span>
  </button>
  <div id="status"></div>
  <div id="footer">
    <a id="options-link">Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
